<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" rx="96" fill="#4945FF"/>

  <!-- Document shadow -->
  <rect x="162" y="118" width="186" height="236" rx="18" fill="#271FE0" opacity="0.5"/>

  <!-- Document body -->
  <rect x="152" y="108" width="186" height="236" rx="18" fill="white"/>

  <!-- Folded corner cutout -->
  <polygon points="290,108 338,156 290,156" fill="#D9D8FF"/>
  <line x1="290" y1="108" x2="290" y2="156" stroke="#C0BFFF" stroke-width="1.5"/>
  <line x1="290" y1="156" x2="338" y2="156" stroke="#C0BFFF" stroke-width="1.5"/>

  <!-- Title line -->
  <rect x="177" y="175" width="100" height="13" rx="6.5" fill="#4945FF" opacity="0.25"/>

  <!-- Content lines -->
  <rect x="177" y="205" width="136" height="9" rx="4.5" fill="#D9D8FF"/>
  <rect x="177" y="223" width="116" height="9" rx="4.5" fill="#D9D8FF"/>
  <rect x="177" y="241" width="126" height="9" rx="4.5" fill="#D9D8FF"/>
  <rect x="177" y="259" width="88"  height="9" rx="4.5" fill="#D9D8FF"/>
  <rect x="177" y="277" width="108" height="9" rx="4.5" fill="#D9D8FF"/>

  <!-- Green badge ring -->
  <circle cx="318" cy="338" r="86" fill="#1F8A4C"/>
  <!-- Green badge fill -->
  <circle cx="318" cy="338" r="76" fill="#27AE60"/>

  <!-- Checkmark -->
  <polyline
    points="282,338 308,364 354,310"
    fill="none"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
